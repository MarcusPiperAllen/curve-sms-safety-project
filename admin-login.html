<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CurveLink – Admin Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0a0a0f;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: #fafafa;
    }

    .container {
      width: 100%;
      max-width: 380px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      justify-content: center;
      margin-bottom: 32px;
    }

    .logo-icon {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 24px rgba(34, 197, 94, 0.3);
      flex-shrink: 0;
    }

    .logo-icon svg { width: 22px; height: 22px; fill: white; }

    .logo-text h1 {
      font-size: 1.25rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: #fafafa;
    }

    .logo-text p {
      font-size: 0.75rem;
      color: #71717a;
      font-weight: 500;
    }

    .card {
      background: linear-gradient(145deg, #18181b 0%, #1f1f23 100%);
      border: 1px solid #27272a;
      border-radius: 20px;
      padding: 32px 28px;
    }

    .card h2 {
      font-size: 1.1rem;
      font-weight: 700;
      color: #fafafa;
      margin-bottom: 6px;
    }

    .card p {
      font-size: 0.875rem;
      color: #71717a;
      margin-bottom: 24px;
    }

    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 500;
      color: #a1a1aa;
      margin-bottom: 8px;
    }

    input[type="password"] {
      width: 100%;
      padding: 14px 16px;
      background: #09090b;
      border: 1px solid #27272a;
      border-radius: 10px;
      color: #fafafa;
      font-size: 1rem;
      font-family: inherit;
      margin-bottom: 20px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input[type="password"]:focus {
      outline: none;
      border-color: #22c55e;
      box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.15);
    }

    input[type="password"]::placeholder { color: #52525b; }

    .error-banner {
      display: none;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #ef4444;
      font-size: 0.85rem;
      font-weight: 500;
      padding: 10px 14px;
      border-radius: 8px;
      margin-bottom: 16px;
    }

    .error-banner.visible { display: block; }

    button[type="submit"] {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
      color: white;
      font-size: 0.95rem;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.2s;
      box-shadow: 0 4px 16px rgba(34, 197, 94, 0.3);
      font-family: inherit;
    }

    button[type="submit"]:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    button[type="submit"]:active { transform: translateY(0); }

    .back-link {
      text-align: center;
      margin-top: 20px;
    }

    .back-link a {
      color: #3f3f46;
      font-size: 0.8rem;
      text-decoration: none;
      transition: color 0.2s;
    }

    .back-link a:hover { color: #71717a; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
      </div>
      <div class="logo-text">
        <h1>CurveLink</h1>
        <p>Command Center</p>
      </div>
    </div>

    <div class="card">
      <h2>Admin Login</h2>
      <p>Enter your admin password to access the dashboard.</p>

      <div class="error-banner" id="errorBanner">
        Incorrect password. Please try again.
      </div>

      <form method="POST" action="/admin/login">
        <label for="password">Admin Password</label>
        <input type="password" id="password" name="password" placeholder="Enter password" autocomplete="current-password" autofocus required />
        <button type="submit">Sign In</button>
      </form>
    </div>

    <div class="back-link">
      <a href="/">&larr; Back to Home</a>
    </div>
  </div>

  <script src="/admin-login.js"></script>
</body>
</html>
